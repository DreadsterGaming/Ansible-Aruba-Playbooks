---
# configure_ports.yml
# Pushes port VLAN assignments to Aruba 2530 switches.
# Reads port configuration from host_vars (auto-generated by the web app).
#
# Usage:
#   ansible-playbook -i ../inventory/hosts.yml playbooks/configure_ports.yml
#   ansible-playbook -i ../inventory/hosts.yml playbooks/configure_ports.yml --limit sw-lobby

- name: Configure port VLAN assignments on Aruba 2530 switches
  hosts: aruba_switches
  gather_facts: false
  connection: network_cli

  vars:
    ansible_network_os: arubanetworks.aos_switch.arubaoss

  tasks:
    - name: Validate that ports variable is defined
      ansible.builtin.assert:
        that:
          - ports is defined
          - ports | length > 0
        fail_msg: >-
          No port configuration found for {{ inventory_hostname }}.
          Ensure host_vars/{{ inventory_hostname }}.yml exists and contains a 'ports' list.
        success_msg: "Found {{ ports | length }} port(s) to configure."

    - name: Push port VLAN configuration
      ansible.netcommon.cli_config:
        config: "{{ lookup('template', '../templates/port_config.j2') }}"
      register: port_result

    - name: Save running configuration
      ansible.netcommon.cli_command:
        command: write memory
      register: save_result

    - name: Display save result
      ansible.builtin.debug:
        var: save_result.stdout
