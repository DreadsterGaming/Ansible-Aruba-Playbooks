---
# bootstrap_vlans.yml
# Creates VLANs 2-299 on all Aruba 2530 switches.
# VLAN 1 is the default VLAN and already exists.
#
# Usage:
#   ansible-playbook -i ../inventory/hosts.yml playbooks/bootstrap_vlans.yml
#   ansible-playbook -i ../inventory/hosts.yml playbooks/bootstrap_vlans.yml --limit sw-lobby

- name: Bootstrap VLANs 2-299 on Aruba 2530 switches
  hosts: aruba_switches
  gather_facts: false
  connection: network_cli

  vars:
    ansible_network_os: arubanetworks.aos_switch.arubaoss

  tasks:
    - name: Create VLANs 2-299
      ansible.netcommon.cli_config:
        config: "{{ lookup('template', '../templates/bootstrap_vlans.j2') }}"
      register: vlan_result

    - name: Save running configuration
      ansible.netcommon.cli_command:
        command: write memory
      register: save_result

    - name: Display save result
      ansible.builtin.debug:
        var: save_result.stdout
